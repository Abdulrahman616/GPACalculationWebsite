<!DOCTYPE html>
<html lang="en">

    <head>

    <meta charset="UTF-8">
        <title> Signup Page GPA Calculation Website </title>
    <meta name="description"
        content="Signup Page">
    <meta name="keywords"
        content="GPA,GPA Calculation">
        
    <link rel="stylesheet" href="styles.css">
    
    </head>

    <body>

    <nav class="navbar">
      <a href="HomePage.html">Home</a>
      <a href="LoginPage.html">Login</a>
      <a href="AboutUs.html">About Us</a>
    </nav>

    <div class="logo">
    <img src="images/logo.png" alt="GPA Website Logo" width="150" usemap="#logomap">
    <map name="logomap">
        <area shape="rect" coords="0,0,150,150" href="AboutUs.html" alt="About Us">
    </map>
    </div>

    <div class="signup-box">
    <h2>Create an Account</h2>
    <p style="text-align: center; color: gray; font-size: 13px;">
        
    </p>

    <form action="HomePage.html" method="get">

        <label for="fullname">Full Name</label>
        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>

        <label for="uniID">University ID</label>
        <input type="text" id="uniID" name="uniID" placeholder="Enter your ID" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>

        <button type="submit">Sign Up</button>

    </form>

    <p class="note">Already have an account? <a href="LoginPage.html">Login</a></p>

</div>

    </body>

</html>
