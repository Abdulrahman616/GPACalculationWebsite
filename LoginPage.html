<!DOCTYPE html>
<html lang="en">

    <head>

    <meta charset="UTF-8">
        <title> Login Page GPA Calculation Website </title>
    <meta name="description"
        content="Login Page">
    <meta name="keywords"
        content="GPA,GPA Calculation">
        
    <link rel="stylesheet" href="styles.css">
    
    </head>

    <body>
        
    <nav class="navbar">
      <a href="HomePage.html">Home</a>
      <a href="SignupPage.html">Sign Up</a>
      <a href="AboutUs.html">About Us</a>
    </nav>

    <div class="logo">
    <img src="images/logo.png" alt="GPA Website Logo" width="150" usemap="#logomap">
    <map name="logomap">
        <area shape="rect" coords="0,0,150,150" href="AboutUs.html" alt="About Us">
    </map>
    </div>

    <div class="login-box">
    <h2>Welcome Back</h2>
    <p style="text-align: center; color: gray; font-size: 13px;">
        
    </p>

    <form action="HomePage.html" method="get">

        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required>

        <label for="uniID">University ID</label>
        <input type="text" id="uniID" name="uniID" placeholder="Enter your ID" required>

        <button type="submit">Login</button>

    </form>

    <p class="note">Don't have an account? <a href="SignupPage.html">Sign Up</a></p>

    </div>

    </body>

</html>
